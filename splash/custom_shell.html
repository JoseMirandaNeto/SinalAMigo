<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>$GODOT_PROJECT_NAME$</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #canvas { width: 100%; height: 100%; margin: 0; padding: 0; border: 0; }
body {
    color: white;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    overflow: hidden; touch-action: manipulation;
    -webkit-overflow-scrolling: touch;
    font-family: 'Nunito', sans-serif;
    position: fixed; width: 100%; height: 100%;
}
#canvas { display: block; }
#canvas:focus { outline: none; }
#status, #status-splash { position: absolute; left: 0; right: 0; top: 0; bottom: 0; }
#status {
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    visibility: hidden;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    z-index: 10;
}
#status-splash { display: none; }
#status-progress, #status-notice { display: none; }

.logo-container {
    display: flex; flex-direction: column;
    align-items: center; gap: 20px; margin-bottom: 40px;
}
.logo-avatar {
    width: 180px; height: 180px; border-radius: 50%;
    border: 4px solid #4fc3f7;
    box-shadow: 0 0 30px rgba(79, 195, 247, 0.4);
    object-fit: cover;
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(79, 195, 247, 0.4); }
    50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(79, 195, 247, 0.6); }
}
.logo-title {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    background: linear-gradient(90deg, #4fc3f7, #81c784, #4fc3f7);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    letter-spacing: 2px;
}
@keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}
.logo-subtitle {
    font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 1rem;
    color: #90caf9; letter-spacing: 4px;
    text-transform: uppercase; opacity: 0.8;
}
.progress-wrapper {
    width: 280px; height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px; overflow: hidden;
}
#status-progress {
    display: block; width: 100%; height: 100%;
    -webkit-appearance: none; appearance: none; border: none;
    background: transparent;
}
#status-progress::-webkit-progress-bar { background: transparent; }
#status-progress::-webkit-progress-value {
    background: linear-gradient(90deg, #4fc3f7, #81c784);
    border-radius: 3px; transition: width 0.3s ease;
}
#status-progress::-moz-progress-bar {
    background: linear-gradient(90deg, #4fc3f7, #81c784);
    border-radius: 3px;
}
#status-notice {
    background-color: rgba(91, 57, 67, 0.95);
    border-radius: 0.5rem; border: 1px solid #9b3943;
    color: #e0e0e0; font-family: 'Nunito', sans-serif;
    line-height: 1.3; margin: 0 2rem;
    overflow: hidden; padding: 1rem;
    text-align: center; z-index: 1; max-width: 500px;
}
@media (max-width: 600px) {
    .logo-title { font-size: 1.8rem; }
    .logo-avatar { width: 120px; height: 120px; }
    .progress-wrapper { width: 180px; }
    .logo-subtitle { font-size: 0.8rem; letter-spacing: 2px; }
    .logo-container { gap: 12px; margin-bottom: 24px; }
}
@media (max-width: 400px) {
    .logo-title { font-size: 1.4rem; }
    .logo-avatar { width: 90px; height: 90px; }
    .progress-wrapper { width: 150px; }
}
    </style>
    $GODOT_HEAD_INCLUDE$
</head>
<body>
    <canvas id="canvas">
        Your browser does not support the canvas tag.
    </canvas>

    <noscript>
        Your browser does not support JavaScript.
    </noscript>

    <div id="status">
        <div class="logo-container">
            <img class="logo-avatar" src="sinalito-avatar.png" alt="Sinalito">
            <div class="logo-title">$GODOT_PROJECT_NAME$</div>
            <div class="logo-subtitle">Aprenda Libras</div>
        </div>
        <div class="progress-wrapper">
            <progress id="status-progress"></progress>
        </div>
        <div id="status-notice"></div>
    </div>

    <script src="$GODOT_URL$"></script>
    <script>
        var engine = new Engine($GODOT_CONFIG);

        (function () {
            var statusOverlay = document.getElementById('status');
            var statusProgress = document.getElementById('status-progress');
            var statusNotice = document.getElementById('status-notice');

            var initializing = true;
            var statusMode = '';

            function setStatusMode(mode) {
                if (statusMode === mode || !initializing) { return; }
                if (mode === 'hidden') {
                    statusOverlay.remove();
                    initializing = false;
                    return;
                }
                statusOverlay.style.visibility = 'visible';
                statusProgress.parentElement.style.display = mode === 'progress' ? 'block' : 'none';
                statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
                statusMode = mode;
            }

            function setStatusNotice(text) {
                while (statusNotice.lastChild) {
                    statusNotice.removeChild(statusNotice.lastChild);
                }
                var lines = text.split('\n');
                lines.forEach(function (line) {
                    statusNotice.appendChild(document.createTextNode(line));
                    statusNotice.appendChild(document.createElement('br'));
                });
            }

            function displayFailureNotice(err) {
                console.error(err);
                if (err instanceof Error) { setStatusNotice(err.message); }
                else if (typeof err === 'string') { setStatusNotice(err); }
                else { setStatusNotice('Ocorreu um erro desconhecido.'); }
                setStatusMode('notice');
                initializing = false;
            }

            var missing = Engine.getMissingFeatures({});

            if (missing.length !== 0) {
                if (navigator.serviceWorker) {
                    var serviceWorkerRegistrationPromise;
                    try {
                        serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
                    } catch (e) {
                        serviceWorkerRegistrationPromise = Promise.reject(new Error('Falha ao registrar service worker.'));
                    }
                    Promise.race([
                        serviceWorkerRegistrationPromise.then(function (registration) {
                            if (registration != null) {
                                return Promise.reject(new Error('Service worker ja existe.'));
                            }
                            return registration;
                        }).then(function () { return engine.installServiceWorker(); }),
                        new Promise(function (resolve) { setTimeout(function () { resolve(); }, 2000); }),
                    ]).then(function () {
                        window.location.reload();
                    }).catch(function (err) {
                        console.error('Erro ao registrar service worker:', err);
                    });
                } else {
                    var msg = 'Erro\nFaltam os seguintes recursos necessarios para executar Godot na Web:\n';
                    displayFailureNotice(msg + missing.join('\n'));
                }
            } else {
                setStatusMode('progress');
                engine.startGame({
                    'onProgress': function (current, total) {
                        if (current > 0 && total > 0) {
                            statusProgress.value = current;
                            statusProgress.max = total;
                        } else {
                            statusProgress.removeAttribute('value');
                            statusProgress.removeAttribute('max');
                        }
                    },
                }).then(function () {
                    setStatusMode('hidden');
                }, function (err) {
                    displayFailureNotice(err);
                });
            }
        })();
    </script>
</body>
</html>
